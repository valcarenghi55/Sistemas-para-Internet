<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <title>Forumlario</title>

    <link rel = "stylesheet" href = "reset.css">
    <link rel = "stylesheet" href = "style.css">
    
</head>
<body>

    <h1>CADASTRO DE EMPRESA</h1>

    <form method = "post" action = "" >

        <table>

            <tr>

                <td class = "label" > <label for = "nome">Nome: </label> </td>
                <td class = "input"> <input id = "nome" type = "text"> </td>

            </tr>

            <tr class = "radio">

                <td colspan="2">
                    
                    <input type="radio" id="radio1" name = "radio"/>
                    <label for="radio1">Software - Desenvolvimento</label> 
                
                    <input type="radio" id="radio2" name = "radio"/>
                    <label for="radio2">Software - Revenda</label> 
                
                    <input type="radio" id="radio3" name = "radio"/>
                    <label for="radio3">Hardware - Venda</label> 
                
                    <input type="radio" id="radio4" name = "radio"/>
                    <label for="radio4">Hardware - Manutenção</label> 

                </td>

            </tr>

            <tr>

                <td class = "label" > <label for = "cep">CEP: </label> </td>
                <td class = "input"> <input id = "cep" type = "text"> </td>

            </tr>
            
            <tr>

                <td class = "label" > <label for = "cidade">Cidade: </label> </td>
                <td class = "input"> <input id = "cidade" type = "text"> </td>

            </tr>


            <tr>

                <td class = "label" > <label for = "estado">Estado: </label> </td>
                <td class = "input"> 

                    <select id="estado">
                    <option value="valor1" selected>Rio Grande do Sul</option>
                    <option value="valor2">Santa Catarina</option>
                    <option value="valor3">Parana</option>

                </select> </td>

            </tr>

            <tr>

                <td class = "label" > <label for = "rua">Rua: </label> </td>
                <td class = "input"> <input id = "rua" type = "text"> </td>

            </tr>

            <tr>

                <td class = "label" > <label for = "numero">Número: </label> </td>
                <td class = "input"> <input id = "numero" type = "text"> </td>

            </tr>

            <tr>

                <td class = "label" > <label for = "complemento">Complemento: </label> </td>
                <td class = "input"> <input id = "complemento" type = "text"> </td>

            </tr>

            <tr>

                <td class = "label" > <label for = "email">Email: </label> </td>
                <td class = "input"> <input id = "email" type = "email"> </td>

            </tr>

            <tr>

                <td class = "label" > <label for = "site">Site: </label> </td>
                <td class = "input"> <input id = "site" type = "url"> </td>

            </tr>

            <tr>

                <td class = "label" colspan = "2"> <label for = "obs">Observações Sobre a Empresa: </label> </td>
                
            </tr>

            <tr>

                <td class = "input" colspan = "2"> <textarea id = "obs"></textarea> </td>

            </tr>

            <tr>

                <td class = "input"> <input id = "enviar" type = "submit" value = "incluir"> </textarea> </td>

            </tr>

        </table>

      
    </form>
    
</body>
</html>

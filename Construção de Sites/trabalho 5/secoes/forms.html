	<form class = "container">
	
		<h1> FAÇA SUA ENCOMENDA </h1>
		
		<div class="mb-3 form-floating">
		
			<input type="text" class="form-control" id="nome" placeholder = "">
			<label for="nome">Nome completo</label>
			  
		</div>
		
		<div class="mb-3 form-floating">
		
			<input type="text" class="form-control" id="tel" placeholder = "">
			<label for="tel">Telefone</label>
			  
		</div>
		
		<div class="mb-3 form-floating">
		
			<input type="email" class="form-control" id="email" placeholder = "">
			<label for="email">Endereço de email</label>
			  
		</div>
		
		<div class="mb-3 form-floating">
		
			<input type="text" class="form-control" id="end" placeholder = "">
			<label for="end">Endereço</label>
			  
		</div>
		
		<div class="row align-items-center">
  
			<div class="col-10 col-md-11">
		
				<select class="form-select" aria-label="Default select example">
				
					<option selected>Selecione seu lanche</option>
					<option value="1">Xis Completo</option>
					<option value="2">Xis Simples</option>
					<option value="3">Xis Frango</option>
					<option value="4">Xis Coração</option>
					<option value="5">Xis Gaudério</option>
					<option value="6">Xis da Casa</option>
					<option value="7">Xis Calabresa</option>
					<option value="8">Xis Lombo</option>
					  
				</select>
			
			</div>
			
			<div class="col-2 col-md-1">
		
				<input type="number" class="form-control">
			
			</div>
			
		</div>
		
		<div class="col-12">
		
			<button onclick = "botao()" class="btn btn-primary" type="submit">ENCOMENDAR</button>
			
		</div>
		
	</form>
